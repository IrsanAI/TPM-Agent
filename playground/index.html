<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IrsanAI TPM Web Hub</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0d1117; color:#e6edf3; margin:20px; }
    .card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:14px; margin-bottom:14px; }
    .row { display:flex; flex-wrap:wrap; gap:12px; }
    .pill{display:inline-block;border-radius:999px;padding:4px 8px;margin:3px;font-size:12px}
    .good{background:#1f6f43;color:#d2ffe8}.bad{background:#8b1e2d;color:#ffd8de}.warn{background:#9a6700;color:#fff3cd}
    .countdown{font-size:24px;font-weight:700;color:#ff7b72}
    .update-banner{display:none;background:#1f6feb33;border:1px solid #1f6feb}
    code{background:#0b1320;padding:2px 6px;border-radius:6px}
    #whatsNewModal{display:none;position:fixed;inset:0;background:#000a;align-items:center;justify-content:center}
    #whatsNewModal .inner{max-width:680px}
    button{background:#238636;color:white;border:1px solid #30363d;border-radius:8px;padding:8px 12px;cursor:pointer}
  </style>
</head>
<body>
  <h1>🧠 IrsanAI TPM Web Hub</h1>

  <div id="updateBanner" class="card update-banner">
    <strong>NEW IrsanAI Update verfügbar</strong>
    <div id="updateHead"></div>
    <button onclick="openUpdateCockpit()">Update-Cockpit öffnen</button>
    <div id="capabilitiesInfo"></div>
  </div>

  <div class="card">
    <h3>🔮 Prediction Oracle (Live/Sim)</h3>
    <p id="oracleMeta">Awaiting snapshot…</p>
    <div id="oracleCountdown" class="countdown">Bro, du hast nur noch -- Sekunden.</div>
    <div id="oraclePills"></div>
    <div id="oracleHops"></div>
    <p id="oracleInfo"></p>
  </div>

  <div class="card">
    <h3>Platform</h3>
    <pre id="platformJson"></pre>
  </div>

  <div id="whatsNewModal">
    <div class="card inner">
      <h3>✨ Was ist neu?</h3>
      <ul id="whatsNewList"></ul>
      <button onclick="closeWhatsNew()">Schließen</button>
    </div>
  </div>

<script>
function fmtDelta(sec){ if(sec<60) return `${sec}s`; if(sec<3600) return `${Math.floor(sec/60)}m ${sec%60}s`; return `${Math.floor(sec/3600)}h ${Math.floor((sec%3600)/60)}m`; }

function renderOracle(snap){
  const now = Date.now();
  const targetMs = new Date(snap.target_ts).getTime();
  const left = Math.max(0, Math.floor((targetMs-now)/1000));
  document.getElementById('oracleMeta').innerHTML = `Erkenntnis: <code>${snap.created_ts}</code> @ <code>${(snap.created_price||0).toFixed(2)}</code> → Ziel <code>${(snap.target_price||0).toFixed(2)}</code>`;
  document.getElementById('oracleCountdown').textContent = `Bro, du hast nur noch ${fmtDelta(left)} bis Ereignis.`;
  document.getElementById('oraclePills').innerHTML = [
    `<span class='pill ${snap.status==='completed'?'good':(snap.status==='expired'?'bad':'warn')}'>Status: ${snap.status||'pending'}</span>`,
    `<span class='pill good'>Streak: ${snap.confirmations_in_row||0}x</span>`,
    `<span class='pill warn'>Rounds: ${snap.validation_rounds||0}</span>`
  ].join('');
  const hops = (snap.hops||[]).slice(-8).map((h,i)=>`<span class='pill ${h.status==='confirmed'?'good':'bad'}'>#${i+1} ${Number(h.confidence_pct||0).toFixed(1)}%</span>`).join('');
  document.getElementById('oracleHops').innerHTML = hops || '<span>Keine Hops vorhanden.</span>';
  document.getElementById('oracleInfo').innerHTML = `Direction: <code>${snap.direction||'-'}</code> • ETA: <code>${snap.target_ts||'-'}</code>`;
}

function simulatedOracle(){
  const now = new Date();
  const price=70000+Math.random()*100;
  return {created_ts:now.toISOString(),created_price:price,target_price:price*1.001,target_ts:new Date(now.getTime()+52000).toISOString(),status:'pending',confirmations_in_row:3,validation_rounds:5,direction:'UP',hops:[{confidence_pct:100,status:'confirmed'},{confidence_pct:82,status:'confirmed'},{confidence_pct:31,status:'missed'}]};
}

async function refreshOracle(){
  try{
    const res=await fetch('/api/oracle',{cache:'no-store'});
    if(res.ok){ const live=await res.json(); if(live.available){ renderOracle(live); return; } }
  }catch(e){}
  renderOracle(simulatedOracle());
}

function openUpdateCockpit(){
  const host=window.location.hostname||'127.0.0.1';
  window.open(`http://${host}:8787`,'_blank');
}

function closeWhatsNew(){ document.getElementById('whatsNewModal').style.display='none'; }

async function refreshUpdate(){
  try {
    const r=await fetch('/api/update/status',{cache:'no-store'});
    if(!r.ok) return;
    const st=await r.json();
    if(st.update_available){
      const banner=document.getElementById('updateBanner');
      banner.style.display='block';
      document.getElementById('updateHead').textContent=`local=${st.local_head||'-'} remote=${st.remote_head||'-'}`;
    }
    if(st.phase==='done' && (st.changelog||[]).length){
      const key = `whatsnew-${st.local_head||'unknown'}`;
      if(localStorage.getItem(key)!=='1'){
        document.getElementById('whatsNewList').innerHTML=(st.changelog||[]).slice(0,8).map(x=>`<li><code>${x}</code></li>`).join('');
        document.getElementById('whatsNewModal').style.display='flex';
        localStorage.setItem(key,'1');
      }
    }
  } catch(e){}
}

async function refreshCapabilities(){
  try{
    const r=await fetch('/api/capabilities',{cache:'no-store'});
    if(!r.ok) return;
    const c=await r.json();
    document.getElementById('capabilitiesInfo').textContent=`Platform: ${c.platform||'unknown'} • Docker=${c.docker} • Termux=${c.termux}`;
    document.getElementById('platformJson').textContent=JSON.stringify(c,null,2);
  }catch(e){}
}

refreshOracle(); refreshCapabilities(); refreshUpdate();
setInterval(refreshOracle,1000); setInterval(refreshCapabilities,10000); setInterval(refreshUpdate,10000);
</script>
</body>
</html>
